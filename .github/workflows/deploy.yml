name: LogiTrack CI/CD Pipeline

# Блок тригерів: визначає, коли саме запускається автоматизація
on:
  push:
    # Запуск при кожному завантаженні коду в головну гілку
    branches: [ "main" ]
  pull_request:
    # Перевірка коду при спробі злиття в основні гілки розробки
    branches: [ "main", "develop" ]

jobs:
  # Перша стадія: Перевірка якості (Quality Gate)
  build-and-test:
    runs-on: ubuntu-latest # Використання віртуальної машини з останньою версією Ubuntu
    steps:
      # 1. Клонування репозиторію на віртуальну машину GitHub Actions
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Встановлення пакетного менеджера pnpm (версія 10 відповідно до локальної)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 3. Налаштування середовища Node.js з увімкненим кешуванням для пришвидшення збірки
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 4. Встановлення залежностей з перевіркою цілісності через lock-файл
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Статичний аналіз коду (Linter) для виявлення помилок стилю та потенційних багів
      - name: Run Linter
        run: pnpm run lint

      # 6. Запуск Unit-тестів для перевірки ізольованої логіки сервісів
      - name: Run Unit Tests
        run: pnpm run test

      # 7. Запуск E2E-тестів для перевірки цілісності API та маршрутів
      - name: Run E2E Tests
        run: pnpm run test:e2e

      # 8. Компіляція проєкту (Build) для підтвердження готовності до Production
      - name: Build Project
        run: pnpm run build

  # Друга стадія: Автоматичне розгортання (CD)
  deploy:
    # Деплой почнеться тільки після успішного виконання всіх тестів
    needs: build-and-test
    runs-on: ubuntu-latest
    # Умова: деплой відбувається лише при пуші в гілку main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      # Надсилання сигналу на Render через секретний Deploy Hook
      - name: Trigger Render Deployment
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}